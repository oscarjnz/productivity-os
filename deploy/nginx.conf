# /etc/nginx/sites-available/productivity-os
# Symlink into sites-enabled, then `certbot --nginx -d your-domain.com`
# (certbot rewrites this file to add the 443 server block + redirect).

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Security headers (defense-in-depth; app also sets some via next.config)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # Brotli (requires nginx brotli module; falls back to gzip otherwise)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 5m;

    # Immutable hashed assets — cache hard
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health probe (no log noise)
    location = /api/healthz {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
